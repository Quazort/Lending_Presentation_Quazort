<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лендинг Разработчика</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen py-10 px-4 flex flex-col items-center justify-center space-y-8">

    <div class="max-w-md w-full bg-gray-800 p-8 rounded-lg shadow-lg border border-gray-700">
        <h1 class="text-2xl font-bold mb-1 text-center text-blue-400">Артур</h1>
        <p class="text-gray-400 text-center mb-6">Python Backend Developer</p>

        <form id="lead-form" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Имя</label>
                <input type="text" id="name" required minlength="2" maxlength="20"
                       class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500 text-white"
                       placeholder="Иван">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Telephone</label>
                <input type="text" id="phone" required pattern="^(?:\+7|8)\d{10}$"
                       title="Формат: +79991234567 или 89991234567"
                       class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500 text-white"
                       placeholder="+79991234567">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" id="email" required
                       class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500 text-white"
                       placeholder="example@mail.com">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Комментарий</label>
                <textarea id="comment" required minlength="10" maxlength="2000"
                          class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500 text-white h-24"
                          placeholder="Минимум 10 символов описания проекта..."></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Отправить заявку
            </button>
        </form>

        <div id="result" class="mt-6 p-4 rounded hidden"></div>
    </div>

    <div class="max-w-md w-full bg-gray-800 p-6 rounded-lg shadow-lg border border-gray-700">
        <div class="flex items-center justify-between mb-4 border-b border-gray-700 pb-3">
            <h2 class="text-lg font-semibold text-gray-200">Статус системы</h2>
            <div id="health-status" class="flex items-center space-x-2 text-sm text-gray-400">
                <span class="w-2 h-2 rounded-full bg-gray-500 animate-pulse"></span>
                <span>Проверка...</span>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Статусы запросов</p>
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div class="bg-gray-700/50 p-2 rounded">
                        <div id="m-total" class="text-lg font-bold text-blue-400">0</div>
                        <div class="text-[10px] text-gray-400">Всего</div>
                    </div>
                    <div class="bg-gray-700/50 p-2 rounded">
                        <div id="m-success" class="text-lg font-bold text-green-400">0</div>
                        <div class="text-[10px] text-gray-400">Успешно</div>
                    </div>
                    <div class="bg-gray-700/50 p-2 rounded">
                        <div id="m-failed" class="text-lg font-bold text-red-400">0</div>
                        <div class="text-[10px] text-gray-400">Упало</div>
                    </div>
                    <div class="bg-gray-700/50 p-2 rounded">
                        <div id="m-ai-error" class="text-lg font-bold text-yellow-500">0</div>
                        <div class="text-[10px] text-gray-400">AI Err</div>
                    </div>
                </div>
            </div>

            <div>
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Тональность сообщений</p>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="bg-gray-700/50 p-2 rounded border-b-2 border-green-500/50">
                        <div id="m-positive" class="text-base font-bold text-green-400">0</div>
                        <div class="text-[10px] text-gray-400">Позитив</div>
                    </div>
                    <div class="bg-gray-700/50 p-2 rounded border-b-2 border-gray-500/50">
                        <div id="m-neutral" class="text-base font-bold text-gray-300">0</div>
                        <div class="text-[10px] text-gray-400">Нейтрал</div>
                    </div>
                    <div class="bg-gray-700/50 p-2 rounded border-b-2 border-red-500/50">
                        <div id="m-negative" class="text-base font-bold text-red-400">0</div>
                        <div class="text-[10px] text-gray-400">Негатив</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            const healthEl = document.getElementById('health-status');

            try {
                const hRes = await fetch('/api/health');
                if (hRes.ok) {
                    healthEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span><span class="text-green-400">Online</span>`;
                } else {
                    healthEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500"></span><span class="text-yellow-400">Status ${hRes.status}</span>`;
                }
            } catch (e) {
                healthEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span><span class="text-red-500">Offline</span>`;
            }

            try {
                const mRes = await fetch('/api/metrics');
                if (mRes.ok) {
                    const metrics = await mRes.json();

                    document.getElementById('m-total').innerText = metrics.request_statuses.TOTAL ?? 0;
                    document.getElementById('m-success').innerText = metrics.request_statuses.SUCCESS ?? 0;
                    document.getElementById('m-failed').innerText = metrics.request_statuses.FAILED ?? 0;
                    document.getElementById('m-ai-error').innerText = metrics.request_statuses.AI_ERROR ?? 0;

                    document.getElementById('m-positive').innerText = metrics.tone_of_appeals.POSITIVE ?? 0;
                    document.getElementById('m-neutral').innerText = metrics.tone_of_appeals.NEUTRAL ?? 0;
                    document.getElementById('m-negative').innerText = metrics.tone_of_appeals.NEGATIVE ?? 0;
                }
            } catch (err) {
                console.error("Ошибка обновления метрик:", err);
            }
        }

        updateDashboard();

        document.getElementById('lead-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Теперь это сработает железно!
            const resultDiv = document.getElementById('result');

            const payload = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                comment: document.getElementById('comment').value.trim()
            };

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                resultDiv.classList.remove('hidden');

                if (response.ok) {
                    resultDiv.className = "mt-6 p-4 rounded bg-green-900/50 border border-green-500 text-green-200";
                    resultDiv.innerHTML = `<strong>Успешно!</strong><br>Заявка принята.`;

                    document.getElementById('lead-form').reset();
                    setTimeout(updateDashboard, 1000);
                } else {
                    resultDiv.className = "mt-6 p-4 rounded bg-red-900/50 border border-red-500 text-red-200";
                    if (data.detail && Array.isArray(data.detail)) {
                        const errors = data.detail.map(err => `${err.loc.join('.')}: ${err.msg}`).join('<br>');
                        resultDiv.innerHTML = `<strong>Ошибка валидации:</strong><br>${errors}`;
                    } else {
                        resultDiv.innerText = `Ошибка: ${data.message || 'Что-то пошло не так'}`;
                    }
                }
            } catch (err) {
                resultDiv.classList.remove('hidden');
                resultDiv.className = "mt-6 p-4 rounded bg-red-900/50 border border-red-500 text-red-200";
                resultDiv.innerText = "Ошибка сети или сервер недоступен";
            }
        });
    </script>
</body>
</html>
